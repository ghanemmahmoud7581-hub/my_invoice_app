name: بناء APK تلقائي
on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'نوع البناء (debug أو release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

permissions:
  contents: write
  actions: write

env:
  PYTHON_VERSION: '3.11'
  JAVA_VERSION: '17'
  FLUTTER_VERSION: '3.41.5'

jobs:
  build-android-apk:
    name: بناء APK
    runs-on: ubuntu-latest
    timeout-minutes: 90  # ✅ زيادة المهلة

    steps:
    - name: 📥 سحب الكود من المستودع
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🗑️ حذف الـ Artifacts القديمة
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const artifacts = await github.rest.actions.listArtifactsForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            per_page: 100,
          });
          for (const artifact of artifacts.data.artifacts) {
            console.log(`حذف: ${artifact.name} (${(artifact.size_in_bytes/1024/1024).toFixed(2)} MB)`);
            await github.rest.actions.deleteArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: artifact.id,
            });
          }
          console.log(`✅ تم حذف ${artifacts.data.artifacts.length} artifact قديمة`);

    # ✅ إضافة: تخزين مؤقت لـ Python المستقل (الإصلاح الرئيسي)
    - name: 💾 Cache Python standalone distributive
      uses: actions/cache@v4
      with:
        path: ~/.cache/serious_python
        key: cpython-3.11.6-standalone-v1

    # ✅ إضافة: تحميل Python المستقل مسبقاً لتجنب انتهاء المهلة
    - name: 🐍 تحميل Python standalone مسبقاً
      run: |
        PYTHON_URL="https://github.com/indygreg/python-build-standalone/releases/download/20231002/cpython-3.11.6+20231002-x86_64-unknown-linux-gnu-install_only.tar.gz"
        DEST="/tmp/cpython-3.11.6+20231002-x86_64-unknown-linux-gnu-install_only.tar.gz"
        CACHE_DIR="$HOME/.cache/serious_python"
        CACHE_FILE="$CACHE_DIR/$(basename $PYTHON_URL)"

        mkdir -p "$CACHE_DIR"

        if [ -f "$CACHE_FILE" ]; then
          echo "✅ Python standalone موجود في الـ cache"
          cp "$CACHE_FILE" "$DEST"
        else
          echo "⬇️ تحميل Python standalone..."
          wget -q --retry-connrefused --waitretry=10 --tries=5 \
            --timeout=120 "$PYTHON_URL" -O "$DEST"
          cp "$DEST" "$CACHE_FILE"
          echo "✅ تم الحفظ في الـ cache"
        fi

    - name: 🐍 إعداد Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: 📦 تثبيت المكتبات
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -e ./src

    - name: ☕ إعداد Java ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}

    - name: 🎯 إعداد Flutter ${{ env.FLUTTER_VERSION }}
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: 'pub'

    # ✅ إضافة: تخزين مؤقت لـ Gradle لتسريع البناء
    - name: 💾 Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
        restore-keys: |
          gradle-${{ runner.os }}-

    - name: 🔧 قبول Android licenses
      run: |
        flutter config --no-analytics
        yes | flutter doctor --android-licenses || true
        flutter doctor -v

    - name: 🏗️ بناء APK
      run: |
        cd src
        BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
        echo "📱 بناء APK نوع: $BUILD_TYPE"
        if [ "$BUILD_TYPE" = "release" ]; then
          flet build apk --release --verbose
        else
          flet build apk --verbose
        fi

    - name: 🔍 البحث عن ملف APK
      run: |
        echo "📂 ملفات APK الموجودة:"
        find src -name "*.apk" -type f

    - name: 📤 رفع ملف APK
      uses: actions/upload-artifact@v4
      with:
        name: ghanem-soft-apk-${{ github.event.inputs.build_type || 'debug' }}-${{ github.sha }}
        path: src/**/**.apk
        if-no-files-found: error
        retention-days: 7

    - name: 📦 إنشاء GitHub Release (release فقط)
      if: startsWith(github.ref, 'refs/tags/') && github.event.inputs.build_type == 'release'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: الإصدار ${{ github.ref_name }}
        files: src/**/**.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
