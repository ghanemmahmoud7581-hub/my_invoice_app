name: بناء APK تلقائي
on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'نوع البناء (debug أو release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

permissions:
  contents: write
  actions: write

env:
  PYTHON_VERSION: '3.11'
  JAVA_VERSION: '17'
  FLUTTER_VERSION: '3.24.0'
  PYTHON_STANDALONE_URL: 'https://github.com/indygreg/python-build-standalone/releases/download/20231002/cpython-3.11.6+20231002-x86_64-unknown-linux-gnu-install_only.tar.gz'
  PYTHON_STANDALONE_TAR: 'cpython-3.11.6+20231002-x86_64-unknown-linux-gnu-install_only.tar.gz'

jobs:
  build-android-apk:
    name: بناء APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
    - name: 📥 سحب الكود من المستودع
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🗑️ حذف الـ Artifacts القديمة
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const artifacts = await github.rest.actions.listArtifactsForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            per_page: 100,
          });
          for (const artifact of artifacts.data.artifacts) {
            console.log(`حذف: ${artifact.name} (${(artifact.size_in_bytes/1024/1024).toFixed(2)} MB)`);
            await github.rest.actions.deleteArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: artifact.id,
            });
          }
          console.log(`✅ تم حذف ${artifacts.data.artifacts.length} artifact قديمة`);

    - name: 🧹 تنظيف مساحة القرص
      run: |
        echo "قبل التنظيف:"
        df -h
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /usr/local/share/boost
        echo "بعد التنظيف:"
        df -h

    # ✅ الحل الحقيقي: تحميل الملف مسبقاً في المسار الذي يبحث عنه serious_python
    - name: 💾 Cache Python standalone TAR
      id: cache-python-tar
      uses: actions/cache@v4
      with:
        path: /tmp/${{ env.PYTHON_STANDALONE_TAR }}
        key: python-standalone-tar-3.11.6-v1

    - name: ⬇️ تحميل Python standalone (إن لم يكن محفوظاً)
      if: steps.cache-python-tar.outputs.cache-hit != 'true'
      run: |
        echo "⬇️ تحميل Python standalone..."
        wget --retry-connrefused --waitretry=10 --tries=5 \
          --timeout=180 --show-progress \
          "${{ env.PYTHON_STANDALONE_URL }}" \
          -O "/tmp/${{ env.PYTHON_STANDALONE_TAR }}"
        echo "✅ تم التحميل: $(du -sh /tmp/${{ env.PYTHON_STANDALONE_TAR }} | cut -f1)"

    # ✅ تثبيت pbzip2 لتسريع فك الضغط (متعدد النوى بدلاً من نواة واحدة)
    - name: ⚡ تثبيت أدوات فك الضغط السريع
      run: |
        sudo apt-get install -y pbzip2 pixz
        echo "✅ pbzip2 جاهز للاستخدام"

    # ✅ فك الضغط مسبقاً قبل أن يحاول serious_python فعل ذلك
    - name: 📦 فك ضغط Python standalone مسبقاً
      run: |
        TAR_FILE="/tmp/${{ env.PYTHON_STANDALONE_TAR }}"
        echo "📦 فك الضغط بسرعة باستخدام pbzip2..."
        # فك الضغط في جميع المسارات المحتملة التي يستخدمها serious_python
        for i in 1 2 3; do
          EXTRACT_DIR="/tmp/hostpython3.11_PRE$i"
          mkdir -p "$EXTRACT_DIR"
          pbzip2 -dc "$TAR_FILE" | tar -x -C "$EXTRACT_DIR" &
        done
        wait
        echo "✅ تم فك الضغط مسبقاً في عدة مسارات"
        ls /tmp/hostpython3.11_* 2>/dev/null || echo "المسارات جاهزة"

    - name: 🐍 إعداد Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: 📦 تثبيت المكتبات
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install flet arabic-reshaper python-bidi
        pip install -e ./src

    - name: ☕ إعداد Java ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}

    - name: 💾 Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
        restore-keys: |
          gradle-${{ runner.os }}-

    - name: 🎯 إعداد Flutter ${{ env.FLUTTER_VERSION }}
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: 'pub'

    - name: 🔧 قبول Android licenses
      run: |
        flutter config --no-analytics
        yes | flutter doctor --android-licenses || true
        flutter doctor -v

    - name: 🏗️ بناء APK
      run: |
        cd src
        BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
        echo "📱 بناء APK نوع: $BUILD_TYPE"
        if [ "$BUILD_TYPE" = "release" ]; then
          flet build apk --release --verbose
        else
          flet build apk --verbose
        fi

    - name: 🔍 البحث عن ملف APK
      run: |
        echo "📂 ملفات APK الموجودة:"
        find src -name "*.apk" -type f

    - name: 📤 رفع ملف APK
      uses: actions/upload-artifact@v4
      with:
        name: ghanem-soft-apk-${{ github.event.inputs.build_type || 'debug' }}-${{ github.sha }}
        path: src/**/**.apk
        if-no-files-found: error
        retention-days: 7

    - name: 📦 إنشاء GitHub Release (release فقط)
      if: startsWith(github.ref, 'refs/tags/') && github.event.inputs.build_type == 'release'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: الإصدار ${{ github.ref_name }}
        files: src/**/**.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
